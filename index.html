<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de BlioBook</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="iniciarSistema()">

    <div class="container">
        <header>
            <h1>BlioBook</h1>
            <p>Ecossistema Digital para Gestão Dinâmica de Conhecimento</p>
        </header>

        <div class="painel-form">
            <h3>Cadastro de Livros</h3>
            
            <input type="hidden" id="idEdicao" value="">

            <label id="lblTitulo">Título do Livro: *</label>
            <input type="text" id="campoTitulo" placeholder="Ex: A Revolução dos Bichos">

            <label id="lblAutor">Autor: *</label>
            <div class="linha-flex">
                <select id="campoAutor">
                    <option value="">Selecione um autor...</option>
                </select>
                <button onclick="abrirNovoAutor()" class="btn-add">+ Novo</button>
            </div>
            
            <div id="boxNovoAutor" class="box-cadastro-rapido">
                <input type="text" id="novoAutorNome" placeholder="Nome do novo autor">
                <div class="botoes-rapidos">
                    <button onclick="salvarNovoAutor()" class="btn-salvar-rapido">Salvar Autor</button>
                    <button onclick="fecharNovoAutor()" class="btn-cancelar-rapido">Cancelar</button>
                </div>
            </div>

            <label id="lblCategoria">Categoria: *</label>
            <div class="linha-flex">
                <select id="campoCategoria">
                    <option value="">Selecione uma categoria...</option>
                </select>
                <button onclick="abrirNovaCategoria()" class="btn-add">+ Nova</button>
            </div>

            <div id="boxNovaCategoria" class="box-cadastro-rapido">
                <input type="text" id="novaCategoriaNome" placeholder="Nome da nova categoria">
                <div class="botoes-rapidos">
                    <button onclick="salvarNovaCategoria()" class="btn-salvar-rapido">Salvar Categoria</button>
                    <button onclick="fecharNovaCategoria()" class="btn-cancelar-rapido">Cancelar</button>
                </div>
            </div>

            <label>Situação:</label>
            <select id="campoSituacao">
                <option value="Disponível">Disponível</option>
                <option value="Emprestado">Emprestado</option>
                <option value="Não Disponível">Não Disponível</option>
            </select>

            <div class="botoes">
                <button onclick="salvarLivro()" class="btn-salvar">Salvar Livro</button>
                <button onclick="limparFormulario()" class="btn-cancelar">Limpar Campos</button>
            </div>
        </div>

        <div class="painel-lista">
            <h3>Livros Cadastrados</h3>
            
            <div class="barra-pesquisa">
                <input type="text" id="campoPesquisa" placeholder="Pesquisar por ID, Título, Autor, Categoria ou Situação..." onkeyup="filtrarTabela()">
            </div>

            <table width="100%">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Autor</th>
                        <th>Categoria</th>
                        <th>Situação</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaCorpo">
                </tbody>
            </table>
        </div>

        <footer>
            <p>Desenvolvido por Saulo Torres</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
